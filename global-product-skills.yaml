# Global Product Skills - oh-my-opencode
# 全局产品技能 - 负责项目整体梳理和协调

## skill: global-project-analysis
```yaml
name: global-project-analysis
description: 
  全局产品对项目整体进行梳理
  确保项目符合需求，协调各模块产品
category: global_product
capabilities:
  - 项目概览：整体了解项目目标和范围
  - 模块拆分：将项目拆分为多个功能模块
  - 协调分配：协调各模块产品负责人
  - 需求整合：整合各模块需求，确保一致性
  - 冲突解决：解决模块间的需求冲突
  - 整体验收：确保整体符合用户需求
triggers:
  - "项目梳理"
  - "整体分析"
  - "全局"
  - "项目概览"
  - "模块拆分"
  - "协调"
  - "整合"
tools:
  - file-read
  - grep
  - glob
  - web-search
input:
  - 项目背景
  - 原始需求文档
  - 现有模块（可选）
output:
  - 项目概览
  - 模块拆分方案
  - 模块负责人分配
  - 协调计划
output_format: |
  ## 项目整体梳理

  ### 项目概览
  - 项目目标：...
  - 目标用户：...
  - 核心价值：...

  ### 模块拆分
  | 模块 | 模块产品 | 概述 |
  |------|----------|------|
  | 用户模块 | 张三 | 用户相关功能 |
  | 订单模块 | 李四 | 订单相关功能 |

  ### 协调计划
  - 各模块产品并行产出需求
  - 每周整体对齐一次
  - 冲突由全局产品协调

  ### 整体验收标准
  - 标准1：...
  - 标准2：...
```

## skill: global-module-coordination
```yaml
name: global-module-coordination
description: 
  协调各模块产品的工作
  确保模块间需求一致，解决冲突
category: global_product
capabilities:
  - 模块对接：协调模块间的接口和依赖
  - 冲突解决：解决模块间的需求冲突
  - 进度协调：跟踪各模块产品的进度
  - 质量把控：确保各模块需求符合整体目标
  - 整体对齐：定期组织整体对齐会议
triggers:
  - "协调"
  - "对齐"
  - "冲突"
  - "整合"
  - "模块对接"
  - "进度"
tools:
  - file-read
  - grep
  - glob
input:
  - 各模块需求文档
  - 冲突问题
  - 进度报告
output:
  - 协调结果
  - 冲突解决方案
  - 进度汇总
output_format: |
  ## 模块协调

  ### 模块进度
  | 模块 | 状态 | 模块产品 | 进度 |
  |------|------|----------|------|
  | 用户模块 | 进行中 | 张三 | 80% |
  | 订单模块 | 待开始 | 李四 | 0% |

  ### 冲突解决
  - 冲突1：用户信息接口 → 解决方案：...
  - 冲突2：订单状态定义 → 解决方案：...

  ### 对齐结论
  - 结论1：...
  - 结论2：...
```

## skill: global-acceptance
```yaml
name: global-acceptance
description: 
  全局产品对整体项目进行验收
  确保项目符合最初需求
category: global_product
capabilities:
  - 整体验收：验收整个项目的功能
  - 需求核对：核对是否满足原始需求
  - 用户价值：确认交付的用户价值
  - 问题汇总：汇总各模块的问题
  - 上线决策：给出上线建议
triggers:
  - "整体验收"
  - "项目验收"
  - "上线决策"
  - "最终验收"
  - "UAT"
tools:
  - file-read
  - grep
  - glob
input:
  - 各模块验收结果
  - 整体需求
  - 测试报告
output:
  - 整体验收报告
  - 问题清单
  - 上线建议
output_format: |
  ## 整体验收报告

  ### 需求核对
  | 需求 | 状态 | 备注 |
  |------|------|------|
  | 需求1 | ✓ 通过 | ... |
  | 需求2 | ✗ 不通过 | ... |

  ### 问题汇总
  - 问题1（模块A）：...
  - 问题2（模块B）：...

  ### 上线建议
  - [ ] 建议上线
  - [ ] 建议延期（原因：...）
```

## skill: global-product-handoff
```yaml
name: global-product-handoff
description: 
  全局产品将整体需求交接给开发和测试
category: global_product
capabilities:
  - 整体交接：将项目整体交接给开发和测试负责人
  - 模块说明：说明各模块的负责人和职责
  - 整体流程：说明模块间的协作流程
  - 关键节点：说明关键的里程碑和节点
triggers:
  - "交接"
  - "整体交接"
  - "转开发"
  - "转测试"
  - "项目交接"
tools:
  - file-read
  - grep
  - glob
input:
  - 模块需求文档
  - 项目计划
  - 负责人列表
output:
  - 交接文档
  - 负责人映射
  - 协作流程
output_format: |
  ## 整体交接

  ### 项目概览
  - 模块数量：5
  - 总工期：2个月

  ### 模块负责人
  | 模块 | 模块产品 | 测试负责人 | 开发负责人 |
  |------|----------|------------|------------|
  | 用户模块 | 张三 | 李四 | 王五 |
  | 订单模块 | 赵六 | 孙七 | 周八 |

  ### 协作流程
  1. 各模块产品独立产出需求
  2. 每周整体对齐
  3. 模块产品和测试/开发直接对接

  ### 时间节点
  - MVP：2周后
  - 整体上线：8周后
```
