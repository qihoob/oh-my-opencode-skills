# Module & Responsibility Skills - oh-my-opencode
# 模块职责管理技能 - 多模块多角色负责制

## skill: module-responsibility-analysis
```yaml
name: module-responsibility-analysis
description: 
  分析需求，识别模块，并定义每个模块的产品/测试/开发负责人
  确保职责清晰、落实到人
category: module
capabilities:
  - 模块识别：从需求中识别功能模块
  - 模块边界：明确每个模块的职责范围
  - 角色识别：为每个模块指定产品/测试/开发负责人
  - 职责定义：明确每个负责人的具体职责
  - 依赖关系：识别模块间的依赖关系
  - 【可用-易用-好用】分层确认每个模块的用户价值
triggers:
  - "定义模块"
  - "识别模块"
  - "职责"
  - "负责人"
  - "模块划分"
  - "需求分析"
  - "模块定义"
  - "产品负责人"
  - "测试负责人"
  - "开发负责人"
tools:
  - file-read
  - grep
  - glob
  - web-search
input:
  - 需求描述
  - 项目背景
  - 现有模块（可选）
output:
  - 模块清单
  - 每个模块的负责人（产品/测试/开发）
  - 每个负责人的职责描述
  - 模块依赖关系
output_format: |
  ## 模块职责分析

  ### 模块清单
  | 模块 | 产品负责人 | 测试负责人 | 开发负责人 | 状态 |
  |------|------------|------------|------------|------|
  | 用户模块 | 张三 | 李四 | 王五 | 待确认 |
  | 订单模块 | - | - | - | 待定义 |

  ### 模块详情
  #### 用户模块
  - 职责范围：用户注册、登录、个人信息管理
  - 产品职责：需求定义、验收标准、优先级排序
  - 测试职责：测试策略、用例设计、缺陷跟踪
  - 开发职责：功能实现、代码质量、技术方案

  #### 订单模块
  - 职责范围：订单创建、支付、取消
  - 产品职责：...
  - ...

  ### 依赖关系
  - 订单模块 → 依赖 → 用户模块
  - 支付模块 → 依赖 → 订单模块

  ### 待确认
  1. 订单模块负责人未确定
  2. 支付模块待定义

examples:
  - "分析需求，识别模块"
  - "定义各个模块的负责人"
  - "这个需求涉及哪些模块"
  - "谁来负责这个功能"
```

