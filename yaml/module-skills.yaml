## skill: module-responsibility-sync
```yaml
name: module-responsibility-sync
description: 
  模块职责的对齐和同步，确保各角色对职责理解一致
  当职责有变化时，更新并同步各方
category: module
capabilities:
  - 职责确认：各方确认自己的职责
  - 变更同步：当职责变化时同步到各方
  - 冲突解决：处理职责边界模糊的问题
  - 状态跟踪：跟踪每个模块的进度状态
  - 提醒机制：提醒相关人关注变更
triggers:
  - "对齐"
  - "同步"
  - "确认职责"
  - "更新"
  - "变更"
  - "职责变化"
  - "协调"
tools:
  - file-read
  - grep
  - glob
input:
  - 当前职责上下文
  - 需要同步的变更
  - 涉及的角色
output:
  - 同步结果
  - 变更清单
  - 待确认事项
output_format: |
  ## 职责同步

  ### 当前状态
  | 模块 | 产品 | 测试 | 开发 | 状态 |
  |------|------|------|------|------|
  | 用户模块 | 张三✓ | 李四✓ | 王五✓ | 已确认 |

  ### 变更内容
  - 订单模块：新增支付功能
  - 负责人变更：小王 → 小李

  ### 待确认
  1. 支付功能测试负责人确认
  2. 开发资源确认

examples:
  - "同步职责变化"
  - "确认各自职责"
  - "更新模块状态"
```

