## skill: product-function-design
```yaml
name: product-function-design
description: 以可用、易用、好用为原则，设计功能方案和页面交互
category: product
capabilities:
  - 功能流程设计：主流程、分支流程、异常流程
  - 页面信息架构：内容优先级、导航结构
  - 交互设计：操作反馈、动画效果、容错处理
  - 可用性设计：防错机制、默认值、智能提示
  - 易用性设计：快捷操作、一键直达、操作可逆
  - 好用性设计：个性化、惊喜感、情感化元素
triggers:
  - "功能设计"
  - "页面设计"
  - "交互设计"
  - "流程设计"
  - "怎么设计"
  - "用户体验"
  - "操作流程"
  - "信息架构"
tools:
  - file-read
  - grep
  - web-search
  - glob
input:
  - 需求描述
  - 目标用户
  - 现有页面/功能（参考）
output:
  - 功能流程图（主/分支/异常）
  - 页面结构设计
  - 交互设计方案
  - 可用性改进点
  - 易用性改进点
  - 好用性设计建议
output_format: |
  ## 功能设计方案

  ### 1. 功能流程设计
  #### 主流程
  - 步骤1：...
  - 步骤2：...
  
  #### 分支流程
  - 场景A：...
  - 场景B：...
  
  #### 异常流程
  - 异常1：...处理方案
  - 异常2：...处理方案

  ### 2. 页面设计
  | 页面 | 核心内容 | 优先级 |
  |------|----------|--------|
  | 页面A | 内容1 | P0 |
  | 页面B | 内容2 | P1 |

  ### 3. 交互设计
  - 操作反馈：...
  - 动画效果：...
  - 容错处理：...

  ### 4. 可用-易用-好用分析
  | 维度 | 当前设计 | 改进建议 |
  |------|----------|----------|
  | 可用 | 满足核心需求 | - |
  | 易用 | 操作X步 | 建议优化为Y步 |
  | 好用 | 无超预期体验 | 建议增加... |
examples:
  - "设计这个功能流程"
  - "页面怎么设计"
  - "交互怎么优化"
  - "怎么设计更好用"
```

