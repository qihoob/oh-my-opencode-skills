## skill: product-requirement-analysis
```yaml
name: product-requirement-analysis
description: 
  从可用、易用、好用角度分析需求，转化为用户价值导向的产品设计
  ⚠️ 分析过程中需要定义模块和负责人，并生成职责上下文文件
category: product
capabilities:
  - 【可用性】功能是否满足用户核心需求？业务流程是否完整闭环？
  - 【易用性】用户学习成本是否低？操作路径是否最短？
  - 【好用性】是否有超预期体验？是否能带来愉悦感？
  - 【模块识别】从需求中识别功能模块
  - 【职责定义】为每个模块指定产品/测试/开发负责人
  - 【上下文生成】分析完成后生成职责上下文文件到项目
  - 用户痛点挖掘：深入了解用户真实场景和问题
  - 用户故事编写：As a... I want to... So that...（强调用户价值）
  - 验收标准定义：明确功能完成的判定条件（可测试）
triggers:
  - "需要开发新功能"
  - "用户反馈这个问题"
  - "产品需求文档"
  - "功能怎么做"
  - "帮我分析需求"
  - "用户故事"
  - "需求拆解"
  - "可用性"
  - "易用性"
  - "好用"
  - "定义模块"
  - "负责人"
workflow_note: |
  工作流：
  1. 分析需求，识别模块
  2. 定义每个模块的产品/测试/开发负责人
  3. 调用 module-context-generator 生成职责上下文文件
tools:
  - file-read
  - grep
  - web-search
  - glob
input:
  - 原始需求描述（越详细越好）
  - 目标用户群体描述
  - 现有系统上下文（可选）
  - 竞品参考（可选）
  - 项目路径（用于生成文件）
output:
  - 可用性分析：功能是否满足核心需求
  - 易用性分析：操作路径、学习成本评估
  - 好用性分析：潜在超预期体验点
  - 结构化用户故事（强调用户价值）
  - 清晰验收标准（可测试）
  - 模块清单（包含负责人）
  - 职责上下文文件（已生成到项目）
output_format: |
  ## 需求分析报告

  ### 可用性分析
  - 核心需求满足度：[高/中/低]
  - 业务流程闭环：[是/否，需补充...]
  
  ### 易用性分析
  - 操作步骤数：X 步（建议 ≤ 3 步）
  - 用户学习成本：[低/中/高]
  
  ### 好用性分析
  - 潜在超预期点：...

  ### 模块清单（核心产出）
  | 模块 | 产品负责人 | 测试负责人 | 开发负责人 | 职责范围 |
  |------|------------|------------|------------|----------|
  | 用户模块 | 张三 | 李四 | 王五 | 注册/登录/个人信息 |
  | 订单模块 | - | - | - | 创建/支付/取消 |

  ### 职责上下文
  - 文件已生成：/project/.omo/module-context.md
  - 包含内容：模块清单、负责人映射、职责描述

examples:
  - "分析这个需求：用户希望..."
  - "从可用易用角度分析"
  - "这个功能怎么设计才更好用"
  - "帮我拆分成用户故事"
  - "这个功能怎么定义验收标准"
  - "定义模块负责人"
```
