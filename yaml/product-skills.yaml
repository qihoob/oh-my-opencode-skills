## skill: product-edge-case
```yaml
name: product-edge-case
description: 识别功能边界和异常场景，确保可用性
category: product
capabilities:
  - 边界值识别：数值边界、长度边界、数量边界
  - 异常场景识别：网络/权限/数据/并发
  - 容错设计：异常情况处理方案
  - 降级策略：核心功能保证
  - 兼容性：多端/多版本/多环境
triggers:
  - "边界"
  - "异常"
  - "容错"
  - "降级"
  - "兼容性"
  - "网络异常"
  - "极端情况"
  - "边界条件"
  - "异常处理"
tools:
  - file-read
  - grep
  - web-search
input:
  - 功能描述
  - 使用场景
output:
  - 边界值清单
  - 异常场景清单
  - 处理方案
  - 降级策略
output_format: |
  ## 边界和异常场景

  ### 边界值
  | 场景 | 边界值 | 处理 |
  |------|--------|------|
  | 文本输入 | 最大X字符 | 截断/提示 |
  | 数量 | 最大X个 | 提示/引导 |

  ### 异常场景
  | 场景 | 处理方案 | 优先级 |
  |------|----------|--------|
  | 网络断开 | 缓存+重试 | P0 |
  | 权限不足 | 引导授权 | P0 |

  ### 降级策略
  - 核心功能：查询 → 保证可用
  - 扩展功能：详情 → 可降级 |
examples:
  - "考虑哪些边界情况"
  - "异常怎么处理"
  - "网络不好怎么办"
  - "数据为空怎么显示"
```
