# Context Management Skills - oh-my-opencode
# 上下文管理技能集合 - 最小上下文原则

## skill: context-classification
```yaml
name: context-classification
description: 
  对需求/任务进行上下文分类，明确最小上下文范围
  确保开发/测试只关注相关上下文，避免信息过载
category: context
capabilities:
  - 需求分类：功能类/Bug类/优化类/重构类
  - 层级识别：核心需求/扩展需求/修饰需求
  - 上下文边界：明确需要了解哪些，不需要了解哪些
  - 关联分析：识别与哪些模块/功能相关
  - 优先级判定：P0核心/P1重要/P2可选
  - 【最小上下文】提取完成任务所需的最小信息集
triggers:
  - "分类"
  - "上下文"
  - "最小"
  - "了解"
  - "整理"
  - "需求分类"
  - "范围"
  - "边界"
  - "关联"
  - "相关"
tools:
  - file-read
  - grep
  - glob
  - lsp-symbols
input:
  - 需求描述/任务描述
  - 当前系统状态
output:
  - 需求分类结果
  - 最小上下文清单
  - 上下文边界说明
  - 关联模块列表
output_format: |
  ## 上下文分类报告

  ### 需求分类
  - 类型：[功能/Bug/优化/重构]
  - 层级：[核心/扩展/修饰]
  - 优先级：P0/P1/P2

  ### 最小上下文（必须了解）
  | 上下文 | 说明 | 优先级 |
  |--------|------|--------|
  | 模块A | 核心功能 | P0 |
  | 模块B | 相关功能 | P1 |

  ### 上下文边界（无需了解）
  - 模块X：不涉及
  - 模块Y：暂不相关

  ### 关联模块
  - 直接相关：模块A
  - 间接相关：模块B

  ### 需要确认的问题
  1. ...
  2. ...
examples:
  - "帮我分类这个需求"
  - "需要了解什么上下文"
  - "这个任务涉及哪些"
  - "最小需要了解什么"
```

## skill: context-minimum
```yaml
name: context-minimum
description: 
  从完整需求中提取最小上下文，确保高效专注
  遵循原则：只获取完成任务所需的最小信息集
category: context
capabilities:
  - 核心提取：提取核心需求，过滤修饰性描述
  - 依赖识别：识别真正的依赖，过滤假性依赖
  - 信息精简：去除冗余信息，保留关键信息
  - 范围界定：明确做到什么程度
  - 验收聚焦：明确如何判定完成
  - 【可用-易用-好用】分层提取
triggers:
  - "最小"
  - "核心"
  - "精简"
  - "提取"
  - "聚焦"
  - "关键"
  - "只需要"
  - "重点"
tools:
  - file-read
  - grep
  - glob
input:
  - 完整需求描述
  - 当前上下文（可选）
output:
  - 最小核心需求
  - 关键依赖
  - 完成标准
  - 需要补充的信息
output_format: |
  ## 最小上下文提取

  ### 核心需求（必须做）
  - 功能：...
  - 目标：...

  ### 关键依赖（必须了解）
  - 依赖A：...
  - 依赖B：...

  ### 完成标准（如何判定）
  - [ ] 标准1
  - [ ] 标准2

  ### 可用-易用-好用 分层
  | 层级 | 内容 | 优先级 |
  |------|------|--------|
  | 可用 | 核心功能 | P0 |
  | 易用 | 简化操作 | P1 |
  | 好用 | 体验优化 | P2 |

  ### 需要补充
  - 信息1：...
  - 信息2：...
examples:
  - "提取最小需求"
  - "核心是什么"
  - "只需要了解什么"
  - "关键点是什么"
```

## skill: context-organization
```yaml
name: context-organization
description: 
  整理和组织上下文信息，形成清晰的结构化文档
  方便开发/测试快速理解和执行
category: context
capabilities:
  - 信息结构化：分类组织零散信息
  - 优先级排序：按重要程度排序
  - 关联映射：建立信息间的关系
  - 可视化呈现：图表化展示结构
  - 查阅友好：便于快速定位关键信息
  - 【可用-易用-好用】视角组织
triggers:
  - "整理"
  - "组织"
  - "结构化"
  - "文档"
  - "梳理"
  - "归档"
tools:
  - file-read
  - grep
  - glob
input:
  - 零散的上下文信息
  - 相关信息
output:
  - 结构化上下文文档
  - 关键信息索引
  - 便于查阅的格式
output_format: |
  ## 上下文整理

  ### 一、核心信息
  1. 需求概述：...
  2. 目标用户：...
  3. 核心价值：...

  ### 二、功能层级
  | 功能 | 层级 | 说明 |
  |------|------|------|
  | 功能A | P0 | 核心功能 |
  | 功能B | P1 | 重要功能 |

  ### 三、可用-易用-好用
  - 可用：功能A、功能B
  - 易用：简化操作C
  - 好用：体验优化D

  ### 四、关键路径
  - 路径1：步骤1 → 步骤2 → 步骤3
  - 路径2：分支A → 分支B

  ### 五、关联参考
  - 相关模块：模块A、模块B
  - 参考文档：文档1、文档2

  ### 六、快速索引
  - 核心关键词：XXX
  - 关键文件：file1, file2
examples:
  - "整理这些信息"
  - "梳理一下上下文"
  - "形成结构化文档"
```

## skill: context-handover
```yaml
name: context-handover
description: 
  跨角色交接上下文，确保信息传递的完整性和准确性
  遵循原则：交接的是整理后的结构化信息
category: context
capabilities:
  - 精简交接：提取关键信息，避免冗余
  - 结构化输出：便于接收方快速理解
  - 疑问标注：标注需要确认的问题
  - 上下文边界：明确说明包含和不含内容
  - 双向确认：确保理解一致
triggers:
  - "交接"
  - "传递"
  - "handoff"
  - "转交"
  - "同步"
  - "对齐"
tools:
  - file-read
  - grep
  - glob
input:
  - 待交接的上下文
  - 接收方角色
output:
  - 结构化交接文档
  - 关键确认点
  - 待确认问题
output_format: |
  ## 上下文交接

  ### 交接给：[角色]

  ### 核心信息
  - 需求：...
  - 目标：...
  - 关键点：...

  ### 包含内容
  - [✓] 功能范围
  - [✓] 关键逻辑
  - [✓] 验收标准
  - [✗] 详细代码（无需了解）

  ### 需要确认
  1. 问题1：...
  2. 问题2：...

  ### 快速指引
  - 关键文档：doc1
  - 核心模块：moduleA
examples:
  - "交接给开发"
  - "传递给测试"
  - "整理交接内容"
  - "handoff"
```
