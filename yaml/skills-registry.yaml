#XQ|# 复盘 → 项目分析: 迭代闭环

#RQ|# ============================================================
#JH|# 闭环关键说明
#ZV|# ============================================================

#KM|# 1. project_feedback_to_module
#KM|#    作用：项目整体层面的结果（dev/test/集成/回归测试）反馈给各模块
#KM|#    流向：project_overall → module_dev / module_test / module_product

#HN|# 2. acceptance_feedback_to_module
#HN|#    作用：验收结果反馈给模块产品
#HN|#    流向：module_product_acceptance / global-acceptance → module_product

#HQ|# 3. iteration_closure
#HQ|#    作用：迭代复盘结果连接到下一轮项目分析
#HQ|#    流向：collab-retrospective → global-project-analysis
