  - "验收标准"
  - "测试重点"
  - "确认需求"
  - "和产品沟通"
  - "测试确认"
  - "优先级"
  - "测试风险"
tools:
  - file-read
  - grep
  - glob
input:
  - 功能需求
  - 测试疑问
  - 风险点
output:
  - 测试范围确认
  - 验收标准确认
  - 风险提示
  - 测试建议
output_format: |
  ## 测试沟通报告

  ### 测试范围确认
  - 核心功能：✓ 需测试
  - 扩展功能：✓ 需测试 / ✗ 可跳过

  ### 验收标准确认
  - 可用：功能正常运作 ✓
  - 易用：操作步骤 ≤ X 步 ✓
  - 好用：有操作反馈 ✓

  ### 测试重点
  - 重点1：... 原因：...
  - 重点2：... 原因：...

  ### 风险提示
  - 风险1：... 建议：...

examples:
  - "确认测试范围"
  - "验收标准是什么"
  - "测试重点是什么"
  - "有什么测试风险"
```

## skill: qa-ux-testing
```yaml
name: qa-ux-testing
description: 从可用、易用、好用角度进行用户体验测试
category: qa
capabilities:
  - 【可用性】功能是否满足核心需求？
  - 【易用性】操作是否简单直观？学习成本？
  - 【好用性】是否有超预期体验？
  - 操作路径测试：验证最短操作路径
  - 引导测试：验证用户引导是否清晰
  - 错误处理测试：验证错误提示是否友好
  - 反馈测试：验证操作反馈是否及时
  - 情感化测试：验证是否有愉悦感
triggers:
  - "用户体验测试"
  - "易用性测试"
  - "UX测试"
  - "可用性测试"
  - "操作流程"
  - "用户界面"
  - "交互测试"
  - "反馈"
tools:
  - file-read
  - grep
  - glob
input:
  - 功能描述
  - 用户场景
  - 验收标准
output:
  - 可用性测试结果
  - 易用性测试结果
  - 好用性测试结果
  - 改进建议
output_format: |
  ## 用户体验测试报告

  ### 可用性测试
  | 测试点 | 期望 | 实际 | 结果 |
  |--------|------|------|------|
  | 功能A | 正常工作 | 正常 | ✓ |

  ### 易用性测试
  | 测试点 | 操作步数 | 期望 | 结果 |
  |--------|----------|------|------|
  | 功能A | 3步 | ≤3步 | ✓ |

  | 测试点 | 是否有引导 | 清晰度 | 结果 |
  |--------|-------------|--------|------|
  | 功能A | 是 | 清晰 | ✓ |

  ### 好用性测试
  | 测试点 | 体验描述 | 评分 |
  |--------|----------|------|
  | 功能A | 有动效反馈 | 4/5 |

  ### 改进建议
  - 问题1：... 建议：...
  - 问题2：... 建议：...

examples:
  - "测试用户体验"
  - "易用性测试"
  - "操作流程测试"
  - "反馈测试"
```

## skill: qa-product-feedback
```yaml
name: qa-product-feedback
description: 向产品反馈测试中发现的问题和改进建议
category: qa
capabilities:
  - 缺陷反馈：功能 bug 和问题
  - 可用性问题：功能层面的问题
  - 易用性问题：操作体验问题
  - 好用性问题：体验提升空间
  - 改进建议：基于测试的优化建议
  - 优先级建议：基于影响面的优先级
triggers:
  - "反馈"
  - "测试问题"
  - "建议"
  - "改进"
  - "用户体验问题"
  - "易用性问题"
tools:
  - file-read
  - grep
  - glob
input:
  - 测试结果
  - 发现的问题
  - 改进建议
output:
  - 问题清单
  - 改进建议
  - 优先级
output_format: |
  ## 测试反馈

  ### 发现的问题
  | 问题 | 类型 | 严重度 | 影响 |
  |------|------|--------|------|
  | 功能异常 | 可用 | P0 | 用户无法使用 |
  | 操作复杂 | 易用 | P1 | 用户需要5步 |
  | 缺少反馈 | 好用 | P2 | 体验一般 |

  ### 改进建议
  - 建议1：... 理由：... 优先级：P1
  - 建议2：... 理由：... 优先级：P2

  ### 可用-易用-好用 反馈
  - 可用：功能基本可用，但有P0问题需修复
  - 易用：操作步骤过多，建议优化
  - 好用：可增加动效提升体验

examples:
  - "反馈测试问题"
  - "建议优化用户体验"
  - "测试发现这些问题"
  - "易用性改进建议"
```
## skill: qa-context-first
```yaml
name: qa-context-first
description: 
  测试前先了解最小上下文 - 所有测试任务的起点
  ⚠️ 必须首先调用此技能
  工作流: 此技能 → 直接进行具体测试任务（无需再调用其他context技能）
category: qa
capabilities:
  - 任务分类：功能测试/性能测试/安全测试/回归测试
  - 上下文范围：明确需要测试的功能范围
  - 最小信息：提取测试所需的最少信息
  - 测试分层：可用/易用/好用 测试重点
  - 边界界定：明确不测试的内容
  - 【重要】此技能会同时完成 context-classification 和 context-minimum 的工作
triggers:
  - "开始测试"
  - "了解测试范围"
  - "先了解"
  - "测试前"
  - "任务范围"
  - "测试上下文"
workflow_note: |
  工作流：qa-context-first → 具体测试任务
  无需再调用 context-classification 或 context-minimum
tools:
  - file-read
  - grep
  - glob
input:
  - 测试任务描述
  - 需求/功能描述
output:
  - 测试任务分类
  - 最小测试上下文
  - 需要测试的功能点
  - 不需要测试的内容
  - 测试优先级
output_format: |
  ## 测试前上下文分析

  ### 任务分类
  - 类型：[功能/性能/安全/回归]
  - 优先级：P0/P1/P2

  ### 最小测试上下文
  | 功能 | 测试重点 | 优先级 |
  |------|----------|--------|
  | 功能A | 核心流程 | P0 |
  | 功能B | 边界情况 | P1 |

  ### 无需测试
  - 模块X：不涉及

  ### 推荐下一步
  - qa-test-case-design（用例设计）
  - qa-test-automation（自动化测试）
  - qa-test-execution（测试执行）
  - qa-ux-testing（用户体验测试）
examples:
  - "开始测试前先了解上下文"
  - "这个功能需要测试哪些"
  - "测试范围是什么"
```
