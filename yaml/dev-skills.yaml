# Dev Role Skills - oh-my-opencode
# 开发角色技能集合 - 最小上下文 + 可用易用好用

## skill: dev-context-first
```yaml
name: dev-context-first
description: 
  开发前先了解最小上下文 - 所有开发任务的起点
  ⚠️ 必须首先调用此技能
  工作流: 此技能 → 直接进行具体开发任务（无需再调用其他context技能）
category: dev
capabilities:
  - 任务分类：功能/Bug/优化/重构
  - 上下文范围：明确需要了解哪些模块
  - 最小信息：提取完成任务所需的最少信息
  - 优先级分层：可用/易用/好用 优先级
  - 边界界定：明确不涉及的内容
  - 【重要】此技能会同时完成 context-classification 和 context-minimum 的工作
triggers:
  - "开始开发"
  - "了解需求"
  - "先了解"
  - "上下文"
  - "开发前"
  - "任务范围"
tools:
  - file-read
  - grep
  - glob
  - lsp-symbols
input:
  - 任务/需求描述
  - 当前系统状态
output:
  - 任务分类结果
  - 最小上下文清单
  - 需要了解的文件/模块
  - 不需要了解的内容
  - 核心依赖
output_format: |
  ## 开发前上下文分析

  ### 任务分类
  - 类型：[功能/Bug/优化/重构]
  - 优先级：P0/P1/P2

  ### 最小上下文
  | 模块 | 需了解程度 | 说明 |
  |------|------------|------|
  | 模块A | 深入 | 核心 |
  | 模块B | 概要 | 相关 |

  ### 无需了解
  - 模块X：不涉及

  ### 推荐下一步
  - dev-implementation（功能实现）
  - dev-debugging（Bug修复）
  - dev-refactoring（代码优化）

examples:
  - "开始开发前先了解上下文"
  - "这个需求涉及哪些模块"
  - "需要先了解什么"
```

## skill: dev-implementation
```yaml
name: dev-implementation
description: 
  根据需求实现功能代码
  前提：先调用 dev-context-first 获取最小上下文
category: dev
capabilities:
  - 【最小上下文】基于 dev-context-first 的分析结果工作
  - 代码生成：遵循项目规范的代码编写
  - 设计模式应用：选择合适的设计模式
  - 错误处理：完善的异常处理机制
  - 日志记录：关键操作的日志输出
  - 单元测试：基础测试用例编写
triggers:
  - "实现功能"
  - "写代码"
  - "开发"
  - "新增"
  - "修改"
  - "做一个"
  - "添加"
workflow_note: |
  工作流：dev-context-first → dev-implementation
  无需再调用 context-classification 或 context-minimum
tools:
  - lsp-tools
  - file-edit
  - ast-grep
  - grep
  - file-read
  - glob
input:
  - dev-context-first 输出的最小上下文
  - 核心需求（仅 P0）
  - 技术约束说明
output:
  - 最小上下文内实现代码
  - 单元测试（如适用）
  - 代码说明
output_format: |
  ## 实现结果

  ### 涉及模块（仅最小上下文内）
  - 模块A：修改内容
  - 模块B：修改内容

  ### 不涉及
  - 模块X：无需修改

  ### 实现代码
  ```
  代码块
  ```

examples:
  - "实现用户登录功能"
  - "写一个 API 接口"
  - "加上这个功能"
```

