description: 测试到产品的验收交接 - 角色过渡技能
category: collaboration
roles: [qa → product]
capabilities:
  - 测试结果整理：将测试结果转化为产品可理解的形式
  - 问题分类：Bug/需求变更/改进建议
  - 验收建议：基于测试结果给出上线建议
  - 遗留问题：非阻塞问题的记录
triggers:
  - "转产品"
  - "测试结果"
  - "测试转产品"
  - "验收"
  - "UAT"
tools:
  - file-read
  - grep
  - glob
input:
  - 测试结果
  - 发现的问题
  - 遗留问题列表
output:
  - 验收报告
  - 问题汇总
  - 上线建议
output_format: |
  ## 测试→产品 验收

  ### 测试结果
  - 通过：X 项
  - 不通过：Y 项
  - 阻塞问题：Z 项

  ### 问题汇总
  | 问题 | 类型 | 严重度 | 状态 |
  |------|------|--------|------|
  | Bug1 | Bug | P0 | 已修复 |

  ### 遗留问题
  - 问题1（不阻塞上线）

  ### 上线建议
  - [ ] 建议上线
  - [ ] 建议延期

examples:
  - "测试完成待验收"
  - "转给产品验收"
  - "UAT"
```
examples:
