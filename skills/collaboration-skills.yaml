## skill: collab-product-alignment
```yaml
name: collab-product-alignment
description: 项目初始化时与产品对齐需求细节，确保可用、易用、好用
category: collaboration
roles: [dev + qa ↔ product]
capabilities:
  - 【可用】确认核心功能满足用户刚需
  - 【易用】确认操作路径简洁、学习成本低
  - 【好用】确认有超预期体验点
  - 用户场景确认：目标用户、典型场景、痛点
  - 功能范围确认：MVP范围、扩展计划
  - 验收标准对齐：明确功能完成的判定
  - 交互细节对齐：页面流程、操作反馈
  - 边界情况对齐：异常场景处理
triggers:
  - "需求对齐"
  - "对齐细节"
  - "项目启动"
  - "初始化"
  - "了解需求"
  - "确认细节"
  - "MVP"
  - "产品评审"
  - "对齐会议"
tools:
  - file-read
  - grep
  - glob
  - web-search
input:
  - 项目背景
  - 已有需求文档
  - 用户画像（可选）
  - 竞品参考（可选）
output:
  - 需求对齐清单（可用/易用/好用）
  - 确认的问题列表
  - 待确认问题列表
  - 设计建议
output_format: |
  ## 需求对齐清单

  ### 可用性（Must Have）
  | 功能 | 核心需求 | 确认状态 |
  |------|----------|----------|
  | 功能A | 满足用户X需求 | ✓已确认 |
  | 功能B | 满足用户Y需求 | ?待确认 |

  ### 易用性（Should Have）
  | 功能 | 操作路径 | 优化建议 |
  |------|----------|----------|
  | 功能A | 当前X步 | 建议优化为Y步 |

  ### 好用性（Could Have）
  | 功能 | 体验点 | 优先级 |
  |------|----------|--------|
  | 功能A | 动效反馈 | P1 |

  ### 待确认问题
  1. ...
  2. ...
examples:
  - "项目启动了，对齐一下需求"
  - "了解下产品细节"
  - "确认这个功能的交互"
  - "MVP范围是什么"
  - "用户场景是什么"
```

