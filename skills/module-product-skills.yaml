# Module Product Skills - oh-my-opencode
# 模块产品技能 - 各模块产品负责自己的模块需求

## skill: module_product_requirement
```yaml
name: module_product_requirement
description: 
  模块产品产出自己负责模块的需求说明
  定义模块的测试负责人和开发负责人
category: module_product
capabilities:
  - 模块需求：产出自己模块的详细需求
  - 可用性：确保功能满足用户核心需求
  - 易用性：确保操作简单直观
  - 好用性：确保有超预期体验
  - 负责人定义：定义模块的测试负责人和开发负责人
  - 依赖声明：声明模块依赖的其他模块
triggers:
  - "模块需求"
  - "需求说明"
  - "产出需求"
  - "我的模块"
  - "定义需求"
  - "负责模块"
workflow_note: |
  工作流：
  1. 产出模块需求
  2. 定义测试负责人
  3. 定义开发负责人
  4. 声明模块依赖
tools:
  - file-read
  - grep
  - glob
  - web-search
input:
  - 模块背景
  - 模块范围
  - 原始需求
output:
  - 模块需求说明
  - 测试负责人
  - 开发负责人
  - 模块依赖
output_format: |
  ## 模块需求说明（用户模块）

  ### 模块概述
  - 模块名称：用户模块
  - 模块产品：张三
  - 职责范围：用户注册、登录、个人信息管理

  ### 需求详情
  #### 1. 用户注册
  - 描述：...
  - 可用性：支持手机号注册
  - 易用性：1步完成
  - 好用性：注册送积分

  #### 2. 用户登录
  - 描述：...
  - 可用性：支持手机号+密码登录
  - 易用性：记住密码
  - 好用性：扫码登录

  ### 负责人定义
  | 角色 | 负责人 | 职责 |
  |------|--------|------|
  | 模块产品 | 张三 | 需求定义、验收 |
  | 测试负责人 | 李四 | 测试策略、用例 |
  | 开发负责人 | 王五 | 功能实现、质量 |

  ### 模块依赖
  - 依赖：无需依赖其他模块
  - 被依赖：订单模块依赖用户模块

  ### 验收标准
  - [ ] 用户可以注册
  - [ ] 用户可以登录
  - [ ] 注册到登录操作 ≤ 2步
```

