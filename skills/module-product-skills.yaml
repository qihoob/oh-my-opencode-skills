## skill: module_product_acceptance
```yaml
name: module_product_acceptance
description: 
  模块产品对自己模块的功能进行验收
category: module_product
capabilities:
  - 验收准备：准备验收材料
  - 验收执行：执行验收测试
  - 问题记录：记录验收问题
  - 验收结论：给出验收结论
triggers:
  - "验收"
  - "模块验收"
  - "功能验收"
  - "我的模块验收"
workflow_note: |
  工作流：
  1. 执行验收测试
  2. 记录问题
  3. 给出结论
tools:
  - file-read
  - grep
  - glob
input:
  - 模块需求说明
  - 验收标准
  - 实现的功能
output:
  - 验收结果
  - 问题清单
  - 验收结论
output_format: |
  ## 模块验收结果（用户模块）

  ### 验收执行
  | 验收点 | 结果 | 备注 |
  |--------|------|------|
  | 用户注册 | ✓ 通过 | ... |
  | 用户登录 | ✗ 不通过 | 扫码登录未实现 |

  ### 问题清单
  | 问题 | 严重度 | 状态 |
  |------|--------|------|
  | 扫码登录未实现 | P1 | 待修复 |

  ### 验收结论
  - [ ] 通过
  - [ ] 有条件通过（需修复P1问题）
  - [ ] 不通过

  ### 遗留问题
  - 问题1（不阻塞上线）：...
```

