## 一键调用示例

### 方式1: 通过 skill() 调用（推荐）

```typescript
// 产品类
skill(name="system/auto-skill-dispatcher", user_message="帮我分析用户登录功能的需求")

// 开发类
skill(name="system/auto-skill-dispatcher", user_message="实现用户登录功能")

// 测试类
skill(name="system/auto-skill-dispatcher", user_message="测试支付流程")

// 协同类
skill(name="system/auto-skill-dispatcher", user_message="开发和测试对齐一下")
```

### 方式2: 通过 task() 调用

```typescript
// 开发任务
task(
  category="unspecified-high",
  load_skills=["system/auto-skill-dispatcher"],
  prompt="实现用户登录功能"
)

// 测试任务
task(
  category="unspecified-high",
  load_skills=["system/auto-skill-dispatcher"],
  prompt="测试这个功能的用户体验"
)
```

### 方式3: 通过指令触发

| 指令 | 触发动作 |
|------|----------|
| 开始开发 | 加载 dev-context-first + dev-implementation |
| 开始测试 | 加载 qa-context-first + qa-test-case-design |
| 需求对齐 | 加载 collab-product-alignment |
| 验收 | 加载 collab-acceptance-review |
| 复盘 | 加载 collab-retrospective |

