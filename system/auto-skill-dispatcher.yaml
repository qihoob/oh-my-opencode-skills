## 输出格式

调度器执行后会输出:

```markdown
## 🎯 任务识别

- **任务类型**: [产品/开发/测试/协同/模块]
- **具体意图**: [用户想做什么]
- **加载技能**: [skill1, skill2, ...]

---

## ⚡ 执行结果

[执行输出]

---

## 📋 下一步建议

- [建议1]
- [建议2]
```

## 配合 Skills

此技能作为统一入口，会根据分析结果调度到具体 Skills:

| 目标任务 | 调度到的 Skills |
|----------|----------------|
| 产品需求 | product-requirement-analysis |
| 功能设计 | product-function-design |
| 页面设计 | product-page-design |
| 开发实现 | dev-implementation |
| 代码审查 | dev-code-review |
| Bug调试 | dev-debugging |
| 测试用例 | qa-test-case-design |
| 验收评审 | collab-acceptance-review |
| 迭代复盘 | collab-retrospective |

## 使用场景

### 场景1: 用户说"实现一个用户登录功能"
```
分析: 开发类任务 → 功能实现
调度: dev-context-first → dev-implementation
```

### 场景2: 用户说"帮我设计这个页面的布局"
```
分析: 产品类任务 → 页面设计
调度: product-page-design
```

### 场景3: 用户说"测试一下这个流程"
```
分析: 测试类任务 → 测试执行
调度: qa-context-first → qa-test-case-design
```

### 场景4: 用户说"开发要和产品对齐一下需求"
```
分析: 协同类任务 → 需求对齐
调度: collab-context-alignment → collab-product-alignment
```

### 场景5: 用户说"开始一个项目"
```
分析: 项目类任务 → 项目启动
调度: project-kickoff (原有技能)
```

---

**注意**: 此技能会自动识别意图并加载合适的 Skills，用户无需手动选择。